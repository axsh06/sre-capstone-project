name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'app/**' # Пайплайн запустится, только если изменения были в папке app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Скачиваем код из репозитория
        uses: actions/checkout@v3

      - name: Логинимся в Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Собираем и пушим Docker-образ
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sre-capstone-app:latest
